<header class="hero">
  <div class="hero-copy">
    <p class="eyebrow">Mecanique mobile a Quebec</p>
    <h1>{{ site.title }}</h1>
    <p class="hero-lead">{{ site.description }}</p>
    <div class="hero-actions">
      <a class="button button-primary" href="#contact">Prendre rendez-vous</a>
      <a class="button button-secondary" href="#services">Voir les services</a>
    </div>
    <ul class="hero-highlights">
      <li>Deplacement rapide a domicile ou au travail</li>
      <li>Soirees et fins de semaine disponibles</li>
      <li>Prix simples et service humain</li>
    </ul>
  </div>
  <div class="hero-visual">
    <img
      class="hero-image"
      src="{{ '/assets/images/placeholder-vehicle.svg' | relative_url }}"
      alt="Image temporaire representant un service de mecanique mobile"
    >
    <div class="hero-badge">
      <strong>Service local</strong>
      <span>Quebec et environs</span>
    </div>
  </div>
</header>
