<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'fr' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    {% assign stylesheet_path = '/assets/css/style.css' %}
    <link rel="stylesheet" href="{% if jekyll.environment == 'development' %}{{ stylesheet_path }}{% else %}{{ stylesheet_path | relative_url }}{% endif %}">
  </head>
  <body>
    {% include header.html %}
    {% include nav.html %}
    
    <main>
      {{ content }}
    </main>

    {% include footer.html %}
  </body>
</html>
